name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --noconfirm `
            --onedir `
            --windowed `
            --name "OnmyojiBot" `
            --add-data "dsl;dsl" `
            --add-data "images;images" `
            --add-data "dsl_engine.py;." `
            --add-data "screenshot.py;." `
            --hidden-import win32gui `
            --hidden-import win32api `
            --hidden-import win32con `
            --hidden-import win32process `
            --hidden-import win32ui `
            --hidden-import pywintypes `
            ui_tools.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnmyojiBot-windows
          path: dist/OnmyojiBot/
          retention-days: 30

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path dist/OnmyojiBot/* -DestinationPath dist/OnmyojiBot-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OnmyojiBot-${{ github.ref_name }}.zip
          generate_release_notes: true
